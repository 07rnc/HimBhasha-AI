<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#E8A838" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9F6C" />
      <stop offset="100%" stop-color="#1B6B4A" />
    </linearGradient>
    <linearGradient id="green-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B6B4A" />
      <stop offset="100%" stop-color="#11452F" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="128" height="128" rx="28" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" />
  
  <!-- Centered Mountain Logo Mark -->
  <g transform="translate(14, 18)" filter="url(#shadow)">
    <!-- Sun -->
    <circle cx="50" cy="55" r="28" fill="url(#gold-grad)" />
    
    <!-- Left Mountain Peak -->
    <polygon points="10,95 42,40 74,95" fill="url(#green-grad)" opacity="0.9" />
    
    <!-- Right Mountain Peak -->
    <polygon points="50,95 77,52 105,95" fill="url(#green-grad)" opacity="0.8" />

    <!-- Center Mountain Peak (Front) -->
    <polygon points="26,95 58,28 90,95" fill="url(#green-grad-dark)" />
    
    <!-- Snow caps -->
    <polygon points="50,44 58,28 66,44 61,39 58,45 55,39" fill="#FFFFFF" />
    <polygon points="35,52 42,40 49,52 46,49 42,53 39,49" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>
