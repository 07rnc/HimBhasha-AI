<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF" />
      <stop offset="100%" stop-color="#FAFBF9" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#E8A838" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9F6C" />
      <stop offset="100%" stop-color="#1B6B4A" />
    </linearGradient>
    <linearGradient id="green-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B6B4A" />
      <stop offset="100%" stop-color="#11452F" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="6" stdDeviation="6" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Sky Background -->
  <rect width="500" height="350" fill="url(#sky-grad)" rx="16" />

  <!-- Mountain Silhouette (Background) -->
  <!-- Left Mountain -->
  <polygon points="-50,350 150,150 350,350" fill="url(#green-grad)" opacity="0.4" />
  <!-- Right Mountain -->
  <polygon points="150,350 320,120 490,350" fill="url(#green-grad)" opacity="0.3" />
  <!-- Sun -->
  <circle cx="230" cy="160" r="45" fill="url(#gold-grad)" opacity="0.8" />
  <!-- Central Mountain (Front) -->
  <polygon points="50,350 250,80 450,350" fill="url(#green-grad-dark)" />
  <!-- Snow Cap on Central Peak -->
  <polygon points="214,130 250,80 286,130 270,120 250,135 230,120" fill="#FFFFFF" />

  <!-- Connecting AI Nodes (Dotted Lines) -->
  <path d="M 80,180 Q 150,100 230,120 T 380,150" fill="none" stroke="#E8A838" stroke-dasharray="4,4" stroke-width="2" opacity="0.6" />
  <circle cx="80" cy="180" r="5" fill="#E8A838" />
  <circle cx="230" cy="120" r="5" fill="#E8A838" />
  <circle cx="380" cy="150" r="5" fill="#E8A838" />

  <!-- Central Mobile Device Mockup -->
  <g transform="translate(180, 70)" filter="url(#card-shadow)">
    <!-- Device Frame -->
    <rect width="140" height="240" rx="20" fill="#1F2937" />
    <!-- Screen -->
    <rect x="6" y="6" width="128" height="228" rx="15" fill="#F9FAFB" />
    
    <!-- App Header -->
    <rect x="6" y="6" width="128" height="30" rx="0" fill="#1B6B4A" clip-path="polygon(0 0, 128 0, 128 30, 0 30)" />
    <circle cx="70" cy="12" r="3" fill="#000" /> <!-- Camera -->
    <text x="70" y="26" font-family="sans-serif" font-weight="bold" font-size="8" fill="#FFFFFF" text-anchor="middle">HimBhasha AI</text>

    <!-- Chat Bubbles Inside Screen -->
    <!-- Bubble 1 (User - right aligned) -->
    <rect x="50" y="55" width="70" height="24" rx="8" fill="#E5E7EB" />
    <text x="56" y="68" font-family="sans-serif" font-size="7" fill="#1F2937">तुहाड़ा क्या हाल है?</text>
    
    <!-- Bubble 2 (AI - left aligned) -->
    <rect x="12" y="90" width="75" height="32" rx="8" fill="#1B6B4A" />
    <text x="18" y="102" font-family="sans-serif" font-size="7" fill="#FFFFFF">How are you?</text>
    <text x="18" y="112" font-family="sans-serif" font-size="6" fill="#FCD34D">(English Translation)</text>

    <!-- Speech Waveform -->
    <g transform="translate(20, 150)">
      <rect x="0" y="10" width="4" height="20" rx="2" fill="#E8A838" />
      <rect x="8" y="5" width="4" height="30" rx="2" fill="#1B6B4A" />
      <rect x="16" y="0" width="4" height="40" rx="2" fill="#1B6B4A" />
      <rect x="24" y="8" width="4" height="24" rx="2" fill="#1B6B4A" />
      <rect x="32" y="12" width="4" height="16" rx="2" fill="#E8A838" />
      <rect x="40" y="5" width="4" height="30" rx="2" fill="#1B6B4A" />
      <rect x="48" y="15" width="4" height="10" rx="2" fill="#E8A838" />
    </g>

    <!-- App Bottom Mic Button -->
    <circle cx="70" cy="205" r="16" fill="url(#gold-grad)" />
    <!-- Microphone Icon -->
    <path d="M 70,197 L 70,207 M 67,204 A 3,3 0 0,0 73,204 M 70,209 L 70,211" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none" />
  </g>

  <!-- Left Float Speech Bubble -->
  <g transform="translate(30, 100)" filter="url(#card-shadow)">
    <path d="M 0,10 A 10,10 0 0,1 10,0 L 110,0 A 10,10 0 0,1 120,10 L 120,40 A 10,10 0 0,1 110,50 L 30,50 L 15,65 L 15,50 A 10,10 0 0,1 0,40 Z" fill="#FFFFFF" />
    <text x="60" y="22" font-family="sans-serif" font-weight="bold" font-size="10" fill="#1B6B4A" text-anchor="middle">नमस्ते / बंदगी</text>
    <text x="60" y="38" font-family="sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">(Kangdi Greeting)</text>
  </g>

  <!-- Right Float Speech Bubble -->
  <g transform="translate(340, 190)" filter="url(#card-shadow)">
    <path d="M 0,10 A 10,10 0 0,1 10,0 L 110,0 A 10,10 0 0,1 120,10 L 120,50 A 10,10 0 0,1 110,60 L 95,60 L 95,75 L 80,60 L 10,60 A 10,10 0 0,1 0,50 Z" fill="#FFFFFF" />
    <text x="60" y="24" font-family="sans-serif" font-weight="bold" font-size="11" fill="#1B6B4A" text-anchor="middle">Hello!</text>
    <text x="60" y="42" font-family="sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">(English Translation)</text>
  </g>
</svg>
