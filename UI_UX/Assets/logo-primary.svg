<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#E8A838" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D9F6C" />
      <stop offset="100%" stop-color="#1B6B4A" />
    </linearGradient>
    <linearGradient id="green-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B6B4A" />
      <stop offset="100%" stop-color="#11452F" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Mountain Logo Mark (Icon) -->
  <g transform="translate(10, 5)" filter="url(#shadow)">
    <!-- Sun -->
    <circle cx="35" cy="40" r="18" fill="url(#gold-grad)" />
    
    <!-- Left Mountain Peak -->
    <polygon points="10,65 30,30 50,65" fill="url(#green-grad)" opacity="0.9" />
    
    <!-- Right Mountain Peak -->
    <polygon points="35,65 52,38 70,65" fill="url(#green-grad)" opacity="0.8" />

    <!-- Center Mountain Peak (Front) -->
    <polygon points="20,65 40,22 60,65" fill="url(#green-grad-dark)" />
    
    <!-- Snow caps -->
    <polygon points="35,32 40,22 45,32 42,29 40,33 38,29" fill="#FFFFFF" />
    <polygon points="26,37 30,30 34,37 32,35 30,38 28,35" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- Typography -->
  <g transform="translate(95, 45)">
    <!-- HimBhasha Text -->
    <text font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="28" fill="#1B6B4A">
      HimBhasha
      <!-- AI Badge -->
      <tspan font-weight="900" fill="#E8A838"> AI</tspan>
    </text>
    
    <!-- Subtitle -->
    <text y="20" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11" fill="#6B7280" letter-spacing="1.5">
      HIMACHALI LANGUAGE ENGINE
    </text>
  </g>
</svg>
